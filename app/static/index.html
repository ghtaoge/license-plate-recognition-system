<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>车牌号识别系统</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">牌</div>
        <div>
          <h1>车牌号识别系统</h1>
          <p>车辆图片智能识别工作台</p>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item active" href="#recognize">图片识别</a>
        <a class="nav-item" href="#history">识别记录</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">License Plate Recognition</p>
          <h2>图片车牌识别</h2>
        </div>
        <div class="status-strip">
          <span id="providerBadge" class="badge badge-blue">识别模式加载中</span>
          <span class="badge badge-green">服务正常</span>
        </div>
      </header>

      <section id="recognize" class="workspace">
        <div class="upload-panel">
          <div id="dropZone" class="drop-zone">
            <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp">
            <div class="upload-icon">+</div>
            <h3>上传图片</h3>
            <p>支持 JPG、PNG、WEBP，建议上传车牌清晰的车辆图片</p>
          </div>
          <div class="actions">
            <button id="chooseButton" class="btn btn-secondary" type="button">上传图片</button>
            <button id="recognizeButton" class="btn btn-primary" type="button" disabled>开始识别</button>
            <button id="clearButton" class="btn btn-ghost" type="button">清空选择</button>
          </div>
          <div id="message" class="message" hidden></div>
        </div>

        <div class="preview-panel">
          <div class="panel-head">
            <h3>图片预览</h3>
            <span id="fileName" class="muted">未选择图片</span>
          </div>
          <div class="preview-box">
            <img id="previewImage" alt="图片预览" hidden>
            <div id="emptyPreview" class="empty-preview">请选择车辆图片</div>
          </div>
        </div>

        <div class="result-panel">
          <div class="panel-head">
            <h3>识别结果</h3>
            <span id="resultStatus" class="badge badge-gray">等待识别</span>
          </div>
          <div class="plate-display" id="plateNumber">--</div>
          <dl class="metrics">
            <div><dt>置信度</dt><dd id="confidence">--</dd></div>
            <div><dt>识别模式</dt><dd id="provider">--</dd></div>
            <div><dt>耗时</dt><dd id="elapsed">--</dd></div>
            <div><dt>定位坐标</dt><dd id="bboxInfo">--</dd></div>
          </dl>
        </div>
      </section>

      <section id="history" class="history-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Records</p>
            <h2>识别记录</h2>
          </div>
          <div class="history-actions">
            <button id="clearHistoryButton" class="btn btn-ghost" type="button">清空记录</button>
            <button id="refreshButton" class="btn btn-secondary" type="button">刷新记录</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>图片</th>
                <th>车牌号</th>
                <th>置信度</th>
                <th>模式</th>
                <th>状态</th>
                <th>耗时</th>
                <th>时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr><td colspan="8" class="empty-cell">暂无识别记录</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <span id="paginationInfo" class="pagination-info">暂无记录</span>
          <button id="prevPageButton" class="btn btn-ghost btn-sm" type="button" disabled>上一页</button>
          <button id="nextPageButton" class="btn btn-ghost btn-sm" type="button" disabled>下一页</button>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
